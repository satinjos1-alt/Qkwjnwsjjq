name: Gemini_Final_Power
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preparar_Proyecto
        run: |
          pip install gdown
          gdown --id 1ZUzXrJ1dUU_5cQzyOO6-y-oH_wEpJlda
          unzip grabpack_in_godot.zip
          D=$(find . -name "project.godot" -exec dirname {} \; | head -n 1)
          echo "P=$D" >> $GITHUB_ENV

      - name: Exportar_APK_Ya
        uses: firebelley/godot-export@v5.2.1
        with:
          # Usamos los espejos de TuxFamily que son mas directos para scripts
          godot_executable_download_url: https://downloads.tuxfamily.org/godotengine/4.2.1/Godot_v4.2.1-stable_linux_x86_64.zip
          godot_export_templates_download_url: https://downloads.tuxfamily.org/godotengine/4.2.1/Godot_v4.2.1-stable_export_templates.tpz
          relative_project_path: ${{ env.P }}
          archive_output: true
